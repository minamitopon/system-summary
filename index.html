<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#102c3d" />
    <link rel="icon" href="data:," />
    <meta
      name="description"
      content="Takumi Seshimo と Takahiro Honda が使用するコントラクトブリッジ・システム Oklahoma のリファレンス。"
    />
    <title>Oklahoma System Notes</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script type="module" src="./assets/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#system-content">本文へ移動</a>

    <header class="site-header">
      <div class="header-suit header-suit--club" aria-hidden="true">♣</div>
      <div class="header-suit header-suit--diamond" aria-hidden="true">♦</div>
      <div class="header-suit header-suit--heart" aria-hidden="true">♥</div>
      <div class="header-suit header-suit--spade" aria-hidden="true">♠</div>
      <div class="header-inner">
        <p class="eyebrow">CONTRACT BRIDGE · SYSTEM NOTES</p>
        <h1>Oklahoma</h1>
        <p class="header-description">
          Short Clubs with Transfer Responses
          <span aria-hidden="true">—</span>
          <span>Takumi Seshimo × Takahiro Honda</span>
        </p>
      </div>
    </header>

    <div class="toolbar-wrap">
      <div class="toolbar" aria-label="閲覧ツール">
        <label class="search-box" for="system-search">
          <span class="search-icon" aria-hidden="true"></span>
          <span class="sr-only">システム全体を検索</span>
          <input
            id="system-search"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="ビッド、HCP、キーワードを検索"
          />
          <kbd>⌘ K</kbd>
        </label>
        <div class="toolbar-actions">
          <span id="open-count" class="open-count" aria-live="polite">0件を展開中</span>
          <button id="expand-all" class="text-button" type="button">すべて開く</button>
          <button id="collapse-all" class="text-button" type="button">すべて閉じる</button>
        </div>
      </div>
    </div>

    <div class="mobile-nav-wrap">
      <nav id="mobile-nav" class="mobile-nav" aria-label="システム項目"></nav>
    </div>

    <div class="page-shell">
      <aside class="sidebar" aria-label="システム項目">
        <div class="sidebar-heading">
          <p>CONTENTS</p>
          <span id="document-count"></span>
        </div>
        <nav id="sidebar-nav" class="sidebar-nav"></nav>
        <div class="legend" aria-label="スートの色分け">
          <p>SUITS</p>
          <div><span class="suit-dot suit-club">♣</span> Clubs</div>
          <div><span class="suit-dot suit-diamond">♦</span> Diamonds</div>
          <div><span class="suit-dot suit-heart">♥</span> Hearts</div>
          <div><span class="suit-dot suit-spade">♠</span> Spades</div>
        </div>
      </aside>

      <main id="system-content" class="content" tabindex="-1">
        <div id="loading-state" class="loading-state" aria-live="polite">
          <span class="loading-mark" aria-hidden="true">♣</span>
          <p>システムノートを読み込んでいます…</p>
        </div>
        <div id="content-root"></div>
      </main>
    </div>

    <footer class="site-footer">
      <p>Oklahoma System Notes</p>
      <a href="https://github.com/minamitopon/system-summary" target="_blank" rel="noreferrer">
        GitHubで原文を見る <span aria-hidden="true">↗</span>
      </a>
    </footer>

    <nav class="bottom-nav" aria-label="前後の項目へ移動">
      <button id="previous-document" type="button" aria-label="前の項目へ">
        <span aria-hidden="true">←</span><span>前へ</span>
      </button>
      <button id="focus-search" type="button" aria-label="検索を開く">
        <span class="bottom-search-icon" aria-hidden="true"></span><span>検索</span>
      </button>
      <button id="next-document" type="button" aria-label="次の項目へ">
        <span>次へ</span><span aria-hidden="true">→</span>
      </button>
    </nav>

    <noscript>
      <div class="noscript-message">このリファレンスの展開表示には JavaScript が必要です。</div>
    </noscript>
  </body>
</html>
